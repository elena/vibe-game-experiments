<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dragon Dash</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
    }
    h1 {
      font-size: 2.5rem;
      color: #ff6600;
      text-shadow: 0 0 10px #ff4400, 0 0 20px #ff2200;
      margin-bottom: 1rem;
      letter-spacing: 4px;
    }
    #game-container {
      position: relative;
      border: 3px solid #ff6600;
      box-shadow: 0 0 20px #ff4400;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      font-size: 1rem;
      color: #ffcc00;
      text-shadow: 1px 1px 0 #000;
      pointer-events: none;
    }
    #overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.82);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
    }
    #overlay h2 {
      font-size: 2rem;
      color: #ff6600;
      text-shadow: 0 0 8px #ff4400;
      letter-spacing: 3px;
    }
    #overlay p { color: #ccc; font-size: 0.9rem; }
    .avatar-grid {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .avatar-btn {
      background: #111;
      border: 2px solid #444;
      padding: 8px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .avatar-btn:hover { border-color: #ff6600; box-shadow: 0 0 8px #ff4400; }
    .avatar-btn.selected { border-color: #ffcc00; box-shadow: 0 0 12px #ffcc00; }
    .avatar-btn canvas { image-rendering: pixelated; }
    .avatar-btn span { color: #ffcc00; font-size: 0.7rem; letter-spacing: 1px; }
    #start-btn {
      background: #ff4400;
      border: 2px solid #ff6600;
      color: #fff;
      padding: 10px 30px;
      font-family: inherit;
      font-size: 1.1rem;
      letter-spacing: 2px;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.15s, box-shadow 0.15s;
    }
    #start-btn:hover { background: #ff6600; box-shadow: 0 0 10px #ff4400; }
    #score-display {
      color: #aaa;
      font-size: 0.85rem;
    }
    #instructions {
      color: #888;
      font-size: 0.75rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>DRAGON DASH</h1>
  <div id="game-container">
    <canvas id="gameCanvas" width="800" height="300"></canvas>
    <div id="ui">
      <span id="score-ui">SCORE: 0</span>
      <span id="hi-score-ui">BEST: 0</span>
      <span id="speed-ui">SPEED: 1</span>
      <span id="treasure-ui">LOOT: 0</span>
    </div>
    <div id="overlay">
      <h2>DRAGON DASH</h2>
      <p>Choose your dragon:</p>
      <div class="avatar-grid" id="avatar-grid"></div>
      <button id="start-btn">START GAME</button>
      <div id="score-display"></div>
      <div id="instructions">SPACE / UP / TAP to jump &nbsp;|&nbsp; DOWN to duck<br>Collect treasure for bonus points &nbsp;|&nbsp; Hearts restore a life &nbsp;|&nbsp; Hourglass slows the world</div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
