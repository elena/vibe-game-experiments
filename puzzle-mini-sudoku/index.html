<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Sudoku</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px 12px 40px;
    }

    #app {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #1a1f3a;
    }

    /* ── Controls ── */
    #controls {
      width: 100%;
      background: #fff;
      border-radius: 12px;
      padding: 12px 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ctrl-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      width: 58px;
      flex-shrink: 0;
    }

    .pill-group { display: flex; gap: 5px; flex-wrap: wrap; }

    .pill {
      padding: 4px 12px;
      border: 2px solid #ccc;
      border-radius: 20px;
      background: transparent;
      color: #333;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
    }
    .pill:hover { border-color: #3d5afe; color: #3d5afe; }
    .pill.active { background: #3d5afe; border-color: #3d5afe; color: #fff; }

    #new-btn {
      margin-top: 4px;
      padding: 7px 18px;
      background: #3d5afe;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      align-self: flex-start;
    }
    #new-btn:hover { background: #2a3eb1; }

    /* ── Status ── */
    #status {
      width: 100%;
      display: flex;
      justify-content: space-between;
      font-size: 0.88rem;
      color: #666;
      padding: 0 2px;
    }
    #mistakes.danger { color: #c62828; font-weight: 700; }

    /* ── Board (table) ── */
    #board-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    #board {
      border-collapse: collapse;
      border: 3px solid #1a1f3a;
      background: #1a1f3a;
    }

    #board td {
      background: #fff;
      text-align: center;
      vertical-align: middle;
      cursor: pointer;
      font-weight: 700;
      color: #1a1f3a;
      border: 1px solid #c8cdd8;
      padding: 0;
      /* size set by JS */
    }

    #board td.box-right  { border-right:  2.5px solid #1a1f3a; }
    #board td.box-bottom { border-bottom: 2.5px solid #1a1f3a; }

    #board td.given    { color: #1a1f3a; cursor: default; }
    #board td.user     { color: #1565c0; }
    #board td.wrong    { color: #c62828; background: #ffebee; }

    #board td.sel      { background: #bbdefb !important; }
    #board td.peer     { background: #e3f2fd; }
    #board td.twin     { background: #dce8fb; }
    #board td.sel.wrong,
    #board td.peer.wrong,
    #board td.twin.wrong { background: #ffcdd2 !important; }

    /* notes sub-grid */
    .notes-grid {
      display: grid;
      width: 100%;
      height: 100%;
    }
    .notes-grid span {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-weight: 600;
      line-height: 1;
    }

    /* ── Numpad ── */
    #numpad {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: center;
      width: 100%;
    }

    .nk {
      width: 48px;
      height: 48px;
      border: 2px solid #ccc;
      border-radius: 8px;
      background: #fff;
      font-size: 1.25rem;
      font-weight: 700;
      color: #1565c0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nk:hover { border-color: #3d5afe; background: #e8f0fe; }
    .nk.done  { color: #bbb; border-color: #e0e0e0; }
    .nk.erase { color: #888; font-size: 1rem; }
    .nk.notes-toggle { font-size: 0.72rem; color: #666; font-weight: 700; }
    .nk.notes-toggle.on { border-color: #3d5afe; color: #3d5afe; background: #e8f0fe; }

    /* ── Overlay ── */
    #overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 50;
    }
    #overlay.hidden { display: none; }

    #msg-box {
      background: #fff;
      border-radius: 16px;
      padding: 30px 36px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      max-width: 280px;
      width: 90%;
    }
    #msg-title { font-size: 1.7rem; font-weight: 700; margin-bottom: 8px; }
    #msg-body  { color: #666; margin-bottom: 20px; font-size: 0.95rem; }
    .msg-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .msg-actions button {
      padding: 9px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
    }
    #msg-btn         { background: #3d5afe; color: #fff; }
    #msg-btn:hover   { background: #2a3eb1; }
    #msg-btn2        { background: #eee; color: #333; }
    #msg-btn2:hover  { background: #ddd; }
    #msg-btn2.hidden { display: none; }
  </style>
</head>
<body>
<div id="app">
  <h1>Mini Sudoku</h1>

  <div id="controls">
    <div class="ctrl-row">
      <span class="ctrl-label">Size</span>
      <div class="pill-group" id="size-group">
        <button class="pill" data-size="4">4×4</button>
        <button class="pill active" data-size="6">6 (2×3)</button>
        <button class="pill" data-size="9">9×9</button>
      </div>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Level</span>
      <div class="pill-group" id="diff-group">
        <button class="pill active" data-diff="easy">Easy</button>
        <button class="pill" data-diff="medium">Medium</button>
        <button class="pill" data-diff="hard">Hard</button>
      </div>
    </div>
    <button id="new-btn">New Game</button>
  </div>

  <div id="status">
    <span id="mistakes">Mistakes: 0 / 3</span>
    <span id="timer">0:00</span>
  </div>

  <div id="board-wrap">
    <table id="board"><tbody></tbody></table>
  </div>

  <div id="numpad"></div>
</div>

<div id="overlay" class="hidden">
  <div id="msg-box">
    <div id="msg-title"></div>
    <div id="msg-body"></div>
    <div class="msg-actions">
      <button id="msg-btn">Play Again</button>
      <button id="msg-btn2" class="hidden">Keep Going</button>
    </div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
